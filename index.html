<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AXSizzle</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Daydream&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Daydream', cursive;
      color: black;
      overflow: hidden;
      background: url("https://t4.ftcdn.net/jpg/04/03/56/31/240_F_403563117_JtShDAex0NbvY1Asy3Wvaiwzxvcqzwr9.jpg") no-repeat center center/cover;
      background-size: cover;
      background-attachment: fixed;
    }

    header {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      font-size: 3rem;
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.5);
      backdrop-filter: blur(10px);
      color: black;
      border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    }

    .login-icon {
      display: flex;
      align-items: center;
      font-size: 1.5rem;
      cursor: pointer;
      position: absolute;
      right: 20px;
      color: black;
    }

    .login-icon img {
      width: 30px;
      height: 30px;
      margin-right: 5px;
    }

    .custom-heading {
      font-family: 'Great Vibes', cursive;
      font-size: 3rem;
      text-align: center;
      color: black;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      padding: 15px 25px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      margin: 50px auto 30px;
      width: fit-content;
    }

    .button-container {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      margin-top: 30px;
    }

    .circle-btn {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.6);
      backdrop-filter: blur(8px);
      color: black;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      transition: transform 0.2s ease, background 0.3s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .circle-btn:hover {
      transform: scale(1.05);
      background: rgba(255, 255, 255, 0.8);
    }

    .circle-btn span {
      font-size: 2rem;
      margin-bottom: 5px;
    }

    .popup {
  display: none;
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(255, 255, 255, 0.5); /* Semi-transparent background */
  padding: 30px;
  border-radius: 15px;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.3);
  z-index: 1000;
  backdrop-filter: blur(8px); /* Apply blur effect */
  width: 90%;
  max-width: 400px;
  text-align: center;
  color: rgb(255, 255, 255);
}


    .popup h2 {
      margin-bottom: 15px;
    }

    .popup input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
    }

    .popup button {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      background: #555;
      color: white;
      cursor: pointer;
      transition: background 0.2s;
    }

    .popup button:hover {
      background: #777;
    }

    .popup p {
      margin-top: 10px;
    }

    .popup a {
      color: #000;
      text-decoration: underline;
      cursor: pointer;
    }

    .overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
      z-index: 999;
    }

    .overlay video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .back-btn {
      position: absolute;
      top: 10px;
      left: 15px;
      font-size: 24px;
      color: black;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <header>
    <div>AXSizzle</div>
    <div class="login-icon" onclick="togglePopup('login')">
      <img src="https://cdn-icons-png.flaticon.com/512/3917/3917705.png" alt="User Icon"> Log In
    </div>
  </header>

  <h2 class="custom-heading">Custom Art That Speaks to You</h2>

  <div class="button-container">
    <button class="circle-btn" onclick="openNewPage('meet.html')">

      <span>🎨</span>
     Meet Us
    </button>
    <button class="circle-btn" onclick="openNewPage('order.html')">
      <span>🛒</span>
      Order Art
    </button>
    <button class="circle-btn" onclick="openNewPage('chat.html')">
      <span>💬</span>
      Live query
    </button>
    <button class="circle-btn" onclick="openNewPage('terms.html')">
      <span>📄</span>
      Terms & condetion
    </button>
  </div>

  <div class="overlay" id="overlay">
    <video id="bgVideo" autoplay muted loop playsinline>
      <source src="https://videos.pexels.com/video-files/6108850/6108850-hd_1920_1080_25fps.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="popup" id="popup">
    <span class="back-btn" onclick="closePopup()">←</span>
    <div id="loginForm">
      <h2>Log In</h2>
      <input type="tel" placeholder="Phone Number" required>
      <input type="password" placeholder="Password" id="loginPassword" required>
      <button onclick="handleLogin()">Log In</button>
      <p>Don't have an account? <a onclick="togglePopup('signup')">Sign Up</a></p>
    </div>
    <div id="signupForm" style="display: none;">
      <h2>Sign Up</h2>
      <input type="text" placeholder="Name" required>
      <input type="tel" placeholder="Phone Number" required>
      <input type="password" placeholder="Password" id="signupPassword" required>
      <input type="password" placeholder="Confirm Password" id="confirmPassword" required>
      <button onclick="handleSignUp()">Sign Up</button>
      <p>Already have an account? <a onclick="togglePopup('login')">Log In</a></p>
    </div>
  </div>

  <script>
    function openNewPage(url) {
      window.open(url, "_blank");
    }

    function togglePopup(form) {
      document.getElementById('popup').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
      document.getElementById('loginForm').style.display = form === 'signup' ? 'none' : 'block';
      document.getElementById('signupForm').style.display = form === 'signup' ? 'block' : 'none';
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    }

    function handleLogin() {
      alert('Login functionality will be implemented here.');
      closePopup();
    }

    function handleSignUp() {
      const password = document.getElementById('signupPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      if (password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      alert('Sign Up functionality will be implemented here.');
      closePopup();
    }
  </script>
</body>
</html>
