<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AXSizzle | Custom Art</title>

  <!-- Tailwind CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Pacifico&family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    html, body {
      height: 100%;
      margin: 0;
      background-image: url('https://t4.ftcdn.net/jpg/04/03/56/31/240_F_403563117_JtShDAex0NbvY1Asy3Wvaiwzxvcqzwr9.jpg');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: sans-serif;
    }

    header {
      background-color: rgba(255, 255, 255, 0);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between; /* Aligns back button to the left and text to the center */
      align-items: center;
      padding: 1rem;
      width: 100%;
    }

    /* Header font */
    .custom-header-font {
      font-family: 'daydream', cursive;
      text-align: center; /* Ensures header text is centered */
      flex-grow: 1; /* Allows header text to occupy the remaining space */
    }

    /* Main body custom font and blur */
    .custom-blur {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(6px);
      border-radius: 2rem;
      padding: 2rem;
      max-width: 100%;
      margin: 6%;
      font-family: 'Pacifico', cursive;
      font-style: italic;
      color: #363637;
    }

    /* Buttons custom font */
    .button-font {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
    }

    /* Back button */
    .back-button {
      padding: 0.5rem 1rem;
      background-color: rgba(255, 255, 255, 0.7);
      border-radius: 1rem;
      color: #363637;
      font-weight: 600;
      transition: all 0.3s ease-in-out;
    }

    .back-button:hover {
      background-color: rgba(255, 255, 255, 1);
      transform: scale(1.1);
    }

    /* Responsive adjustments */
    @media (max-width: 640px) {
      .custom-blur {
        padding: 1.5rem;
      }
      .w-36 {
        width: 28px;
        height: 28px;
      }
      .text-xl {
        font-size: 1rem;
      }
    }
  </style>
</head>

<body class="flex flex-col min-h-screen">

  <!-- Header with Back Button -->
  <header class="shadow-md py-8 px-6 flex justify-between items-center rounded-b-xl min-h-[100px]">
    <a href="index.html" class="back-button">Back</a>
    <h1 class="text-4xl font-bold text-black drop-shadow-sm custom-header-font">AXSizzle | Art Mart</h1>
  </header>

  <!-- Main Content Area -->
  <section class="flex-grow max-w-4xl mx-auto text-center mt-16 custom-blur shadow-lg">
    <h2 class="text-4xl mb-6 drop-shadow-lg">Bring Your Vision to Life</h2>
    <p class="mb-8 drop-shadow-lg text-lg">Now is the perfect time to bring your favorite art style to life with a custom artwork crafted just for you.</p>

    <!-- Circular Buttons -->
    <div class="flex justify-center space-x-16 mt-8 mb-4">
      <a href="custom.html" aria-label="Personalized Art"
         class="button-font flex items-center justify-center w-36 h-36 bg-white bg-opacity-50 backdrop-blur-lg text-black text-center rounded-full transition-all duration-300 ease-in-out transform hover:scale-110 hover:shadow-[0_0_25px_rgba(255,255,255,0.8)] text-xl shadow-2xl">
         Personalized Art
      </a>
      <a href="vault.html" aria-label="Artistry Vault"
         class="button-font flex items-center justify-center w-36 h-36 bg-white bg-opacity-50 backdrop-blur-lg text-black text-center rounded-full transition-all duration-300 ease-in-out transform hover:scale-110 hover:shadow-[0_0_25px_rgba(255,255,255,0.8)] text-xl shadow-2xl">
         Artistry Vault
      </a>
    </div>
  </section>

  <!-- Footer -->
  <footer class="text-center p-4 text-white bg-black bg-opacity-50 mt-10">
    &copy; 2025 AXSizzle. All rights reserved.
  </footer>
</body>
</html>
